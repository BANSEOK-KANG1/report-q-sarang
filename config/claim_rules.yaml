# Default market mapping by study type
maps_by_study_type:
  rct: research_only
  observational_human: research_only
  systematic_review: research_only
  meta_analysis: research_only
  animal: research_only
  in_vitro: research_only
  review_narrative: research_only
  case_report: research_only

# Liquor ads: only objective ingredient/research-existence language after human approval
liquor_safe_requires:
  citation_status: approved
  maps_to_market: KR_liquor_context
  max_evidence_for_auto_context: [F, E]  # traditional / review context only; never disease

prohibited_marketing_phrases:
  - FDA approved
  - FDA-approved
  - cures
  - treats
  - prevents cancer
  - clinically proven to treat
  - 암 치료
  - 면역력 증진 보장
  - 피로 회복 효과
  - 식약처 효능 인정
