# Research insights — efficacy / biological-effects focused (education only)

max_insights: 18
fetch_visuals: true
multiview_translate: true
include_priority_review: true
include_approved_liquor: false
# Prefer papers about biological effects / structure-function themes
focus: efficacy

# Hard disease-name / off-topic titles stay out of the public hub
exclude_title_keywords:
  - cancer
  - anticancer
  - antitumor
  - anti-tumor
  - carcinoma
  - leukemia
  - diabetic
