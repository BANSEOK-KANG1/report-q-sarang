  - systematic_review
  - meta_analysis
  - observational_human
  - review_narrative
  - animal
  - in_vitro

disclaimer: |
  본 페이지는 학술 문헌을 **연구·교육 목적**으로 요약·정리한 자료입니다.
  질병의 예방·치료·진단과 무관하며, 제왕충초 담금주의 효능·효과를 주장하지 않습니다.
  ‘효능 관련 논문’은 **연구자들이 다루는 생리활성·기능성 주제**를 뜻하며, 제품 광고 문구가 아닙니다.
  원문과 상이한 해석이 있을 수 있으며, 인용 시 반드시 원문을 확인하세요.
