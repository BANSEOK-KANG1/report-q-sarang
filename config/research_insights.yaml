# Research insights — per-paper professional summaries (not marketing blog)

max_insights: 20
include_priority_review: true
include_approved_liquor: true

# Skip papers whose titles suggest disease/therapy framing
exclude_title_keywords:
  - cancer
  - anticancer
  - antitumor
  - anti-tumor
  - diabetic
  - alzheimer
  - parkinson
  - thrombo
  - obesity
  - wound
  - neurodegener

prefer_title_keywords:
  - biosynthesis
  - production
  - cultivation
  - militaris
  - cordycepin
  - review
  - fermentation
  - metabol
  - compound
  - bioactive

disclaimer: |
  본 페이지는 학술 문헌을 **연구·교육 목적**으로 요약·정리한 자료입니다.
  질병의 예방·치료·진단과 무관하며, 제왕충초 담금주의 효능·효과를 주장하지 않습니다.
  원문과 상이한 해석이 있을 수 있으며, 인용 시 반드시 원문을 확인하세요.
